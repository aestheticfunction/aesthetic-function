<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Function</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      padding: 16px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff6b6b;
    }
    .status-indicator.connected {
      background: #51cf66;
    }
    .config {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #a0a0a0;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 12px;
    }
    input:focus {
      outline: none;
      border-color: #0d99ff;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #0d99ff;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #0b88e6;
    }
    button:disabled {
      background: #3a3a3a;
      cursor: not-allowed;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .button-group button {
      flex: 1;
    }
    .btn-secondary {
      background: #7c3aed;
    }
    .btn-secondary:hover {
      background: #6d28d9;
    }
    .log {
      margin-top: 16px;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      font-family: 'SF Mono', monospace;
      font-size: 10px;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Aesthetic Function</h1>
  
  <div class="status">
    <div class="status-indicator" id="statusIndicator"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="config">
    <label for="serverUrl">Server URL</label>
    <input 
      type="text" 
      id="serverUrl" 
      placeholder="http://localhost:3001"
      value="http://localhost:3001"
    >
  </div>

  <button id="connectBtn">Connect</button>

  <div class="button-group">
    <button id="captureBtn" class="btn-secondary" disabled>Send Selection</button>
  </div>

  <div class="log" id="log"></div>

  <script>
    /**
     * @aesthetic-function/figma-plugin - ui.html
     *
     * RUNTIME: Figma Plugin UI (iframe)
     * RESPONSIBILITIES:
     *   - Makes network requests to the Server
     *   - Forwards Figma Operations to code.ts via postMessage
     *   - Supports configurable SERVER_URL
     *   - Implements polling fallback when WebSocket unavailable
     *
     * CAN: Access network
     * CANNOT: Assume localhost is reachable (tunneling may be needed)
     *
     * IMPORTANT: localhost will NOT work from Figma desktop app!
     * You must use a tunnel (ngrok, cloudflared) to expose the server.
     */

    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const serverUrlInput = document.getElementById('serverUrl');
    const connectBtn = document.getElementById('connectBtn');
    const captureBtn = document.getElementById('captureBtn');
    const logEl = document.getElementById('log');

    // Settings will be loaded from figma.clientStorage via code.ts
    let settingsLoaded = false;
    let currentServerUrl = '';

    let ws = null;
    let pollInterval = null;
    let reconnectTimeout = null;

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `[${time}] ${message}<br>`;
      logEl.scrollTop = logEl.scrollHeight;
      // Keep log size manageable
      const lines = logEl.innerHTML.split('<br>');
      if (lines.length > 50) {
        logEl.innerHTML = lines.slice(-50).join('<br>');
      }
    }

    function setConnected(connected, mode = '') {
      if (connected) {
        statusIndicator.classList.add('connected');
        statusText.textContent = mode ? `Connected (${mode})` : 'Connected';
        connectBtn.textContent = 'Disconnect';
        captureBtn.disabled = false;
      } else {
        statusIndicator.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        connectBtn.textContent = 'Connect';
        captureBtn.disabled = true;
      }
    }

    /**
     * Forward received Figma Operations to code.ts sandbox
     * Each operation is sent individually for processing
     */
    function forwardOperations(operations, requestId) {
      log(`Forwarding ${operations.length} operation(s) to plugin...`);
      parent.postMessage({
        pluginMessage: {
          type: 'APPLY_OPERATIONS',
          payload: { operations, requestId }
        }
      }, '*');
    }

    /**
     * Handle messages from code.ts
     */
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg) {
        if (msg.type === 'SETTINGS') {
          // Received stored settings from figma.clientStorage
          var pl = msg.payload || {};
          if (pl.serverUrl) {
            serverUrlInput.value = pl.serverUrl;
            log('Loaded saved server URL');
          }
          settingsLoaded = true;
        } else if (msg.type === 'SELECTION_CAPTURED') {
          // Received captured selection from code.ts - send to server
          var pl = msg.payload || {};
          log('Captured: ' + pl.nodeName + ' (' + (pl.changes || []).length + ' changes)');
          sendDesignChange(pl);
          
          // Phase 8C: If variant mapping info is present, send map update
          if (pl.variantMapping) {
            sendMapUpdate(pl.variantMapping);
          }
        } else if (msg.type === 'OPERATION_RESULT') {
          var pl = msg.payload || {};
          var successCount = pl.successCount || 0;
          var failCount = pl.failCount || 0;
          
          if (pl.success) {
            log('✓ All ' + successCount + ' operation(s) succeeded');
          } else {
            log('⚠ ' + successCount + ' succeeded, ' + failCount + ' failed');
            // Log details of failed operations
            var results = pl.results || [];
            for (var i = 0; i < results.length; i++) {
              var r = results[i];
              if (!r.ok) {
                var target = r.nodeQuery ? r.nodeQuery : 'unknown';
                log('  ✗ ' + r.action + ' on "' + target + '": ' + (r.error || 'unknown error'));
              }
            }
          }
        } else if (msg.type === 'COMPOSE_RESULT') {
          // Phase 11B: Handle COMPOSE_RESULT from code.ts
          var pl = msg.payload || {};
          var results = pl.results || [];
          var successCount = results.filter(function(r) { return r.success; }).length;
          var failCount = results.length - successCount;
          
          if (pl.success) {
            log('✓ Compose: ' + successCount + ' operation(s) completed');
          } else {
            log('⚠ Compose: ' + successCount + ' succeeded, ' + failCount + ' failed');
            for (var i = 0; i < results.length; i++) {
              var r = results[i];
              if (!r.success) {
                log('  ✗ ' + r.opId + ': ' + (r.error || 'unknown error'));
              }
            }
          }
          
          // Send result back to server if connected
          sendComposeResult(pl);
        } else if (msg.type !== 'PONG') {
          log('From plugin: ' + msg.type);
        }
      }
    };

    /**
     * Send DESIGN_CHANGE to server
     */
    async function sendDesignChange(payload) {
      if (!currentServerUrl) {
        log('Error: Not connected');
        return;
      }
      
      try {
        var requestId = 'design-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
        var message = {
          type: 'DESIGN_CHANGE',
          requestId: requestId,
          timestamp: new Date().toISOString(),
          payload: payload
        };
        
        // Send via WebSocket if available, else HTTP POST
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(message));
          log('Sent DESIGN_CHANGE via WebSocket');
        } else {
          var res = await fetch(currentServerUrl + '/design-change', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(message)
          });
          if (res.ok) {
            log('Sent DESIGN_CHANGE via HTTP');
          } else {
            log('Error sending: HTTP ' + res.status);
          }
        }
      } catch (e) {
        log('Error sending DESIGN_CHANGE: ' + e.message);
      }
    }

    /**
     * Send map update to server for component-map.json
     * Phase 8C: Stable ID mapping for variants
     */
    async function sendMapUpdate(variantMapping) {
      if (!currentServerUrl) {
        return; // Silently skip if not connected
      }
      
      try {
        var res = await fetch(currentServerUrl + '/map-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            baseName: variantMapping.baseName,
            componentSetNodeId: variantMapping.componentSetNodeId,
            variantState: variantMapping.variantState,
            variantNodeId: variantMapping.variantNodeId
          })
        });
        if (res.ok) {
          var result = await res.json();
          if (result.changed) {
            log('✓ Updated component map: ' + variantMapping.baseName);
          }
        } else {
          log('Map update failed: HTTP ' + res.status);
        }
      } catch (e) {
        // Non-blocking - don't spam the log for map update failures
        console.warn('Map update error:', e.message);
      }
    }

    /**
     * Handle incoming server message (WebSocket or poll response)
     */
    function handleServerMessage(data) {
      // Handle APPLY_OPERATIONS message from server
      var payload = data.payload || {};
      if (data.type === 'APPLY_OPERATIONS' && payload.operations) {
        forwardOperations(payload.operations, payload.originRequestId || data.requestId);
      }
      // Phase 11B: Handle COMPOSE_OPERATIONS message from server
      else if (data.type === 'COMPOSE_OPERATIONS' && payload.operations) {
        forwardComposeOperations(payload.operations, payload.originRequestId, payload.mode);
      }
      // Handle legacy/direct operations array (from polling)
      else if (Array.isArray(data.operations) && data.operations.length > 0) {
        forwardOperations(data.operations, data.requestId);
      }
      // Connected message
      else if (data.type === 'CONNECTED') {
        log('Server version: ' + (payload.version || 'unknown'));
      }
    }

    /**
     * Forward COMPOSE_OPERATIONS to code.ts sandbox (Phase 11B)
     */
    function forwardComposeOperations(operations, requestId, mode) {
      log('Forwarding ' + operations.length + ' compose operation(s) to plugin...');
      parent.postMessage({
        pluginMessage: {
          type: 'COMPOSE_OPERATIONS',
          payload: { operations: operations, originRequestId: requestId, mode: mode }
        }
      }, '*');
    }

    /**
     * Send COMPOSE_RESULT back to server (Phase 11B)
     */
    async function sendComposeResult(payload) {
      if (!currentServerUrl) {
        return; // Silently skip if not connected
      }
      
      try {
        // If WebSocket is available, send via WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'COMPOSE_RESULT',
            requestId: payload.originRequestId,
            timestamp: new Date().toISOString(),
            payload: payload
          }));
          log('Sent COMPOSE_RESULT via WebSocket');
        }
        // Otherwise just log (HTTP result endpoint not implemented)
      } catch (e) {
        console.warn('Error sending COMPOSE_RESULT:', e.message);
      }
    }

    /**
     * Save server URL to figma.clientStorage via code.ts
     */
    function saveSettings(serverUrl) {
      parent.postMessage({
        pluginMessage: {
          type: 'SET_SETTINGS',
          payload: { serverUrl: serverUrl }
        }
      }, '*');
    }

    /**
     * Connect via WebSocket with polling fallback
     */
    async function connect() {
      const serverUrl = serverUrlInput.value.trim();
      currentServerUrl = serverUrl;
      saveSettings(serverUrl);
      
      // Clear any existing connections
      stopPolling();
      if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
      }
      
      // Try WebSocket first
      try {
        const wsUrl = serverUrl.replace(/^http/, 'ws') + '/ws';
        log(`Connecting to ${wsUrl}...`);
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          log('WebSocket connected');
          setConnected(true, 'WebSocket');
        };
        
        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            log(`Received: ${data.type || 'message'}`);
            handleServerMessage(data);
          } catch (e) {
            log(`Error parsing message: ${e.message}`);
          }
        };
        
        ws.onclose = () => {
          log('WebSocket disconnected');
          setConnected(false);
          ws = null;
          // Fall back to polling after a brief delay
          reconnectTimeout = setTimeout(() => startPolling(serverUrl), 1000);
        };
        
        ws.onerror = (err) => {
          log('WebSocket error, will fall back to polling');
          // onclose will be called after onerror
        };
      } catch (e) {
        log(`WebSocket failed: ${e.message}, using polling`);
        startPolling(serverUrl);
      }
    }

    /**
     * Polling fallback when WebSocket is unavailable
     * (e.g., CORS issues, tunneling limitations)
     */
    function startPolling(serverUrl) {
      if (pollInterval) return;
      
      log('Starting polling fallback...');
      setConnected(true, 'Polling');
      
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch(`${serverUrl}/poll`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          handleServerMessage(data);
          setConnected(true, 'Polling');
        } catch (e) {
          setConnected(false);
        }
      }, 1000);
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
      stopPolling();
      if (reconnectTimeout) {
        clearTimeout(reconnectTimeout);
        reconnectTimeout = null;
      }
      setConnected(false);
      log('Disconnected');
    }

    connectBtn.addEventListener('click', () => {
      if (statusIndicator.classList.contains('connected')) {
        disconnect();
      } else {
        connect();
      }
    });

    captureBtn.addEventListener('click', () => {
      // Request code.ts to capture the current selection
      parent.postMessage({ pluginMessage: { type: 'CAPTURE_SELECTION' } }, '*');
      log('Capturing selection...');
    });

    // Request stored settings from code.ts (uses figma.clientStorage)
    parent.postMessage({ pluginMessage: { type: 'GET_SETTINGS' } }, '*');
    // Initial ping to code.ts
    parent.postMessage({ pluginMessage: { type: 'PING' } }, '*');
    log('UI initialized');
    log('⚠️ Use a tunnel URL (ngrok/cloudflared) - localhost won\'t work!');
  </script>
</body>
</html>
